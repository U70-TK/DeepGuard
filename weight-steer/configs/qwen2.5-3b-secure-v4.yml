base_model: Qwen/Qwen2.5-Coder-3B
model_type: Qwen2ForCausalLM
tokenizer_type: AutoTokenizer

load_in_8bit: false
load_in_4bit: false

datasets:
  - path: weight-steer/data/qwen2.5-3b-secure-train.jsonl
    ds_type: json
    type: completion
    field: text
test_datasets:
  - path: weight-steer/data/qwen2.5-3b-secure-val.jsonl
    ds_type: json
    type: completion
    field: text
val_set_size: 0
dataset_prepared_path: weight-steer/axolotl-datasets/qwen2.5-3b-secure-v4
dataset_processes: 4

output_dir: trained/qwen2.5-3b-weight-steer-secure-v4
sequence_len: 1024
sample_packing: false
eval_sample_packing: false
pad_to_sequence_len: true

adapter: lora
lora_model_dir:
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_linear: true
merge_lora: false  # handled by --merge_lora step in train.py

wandb_project: weight-steer-codeguard
wandb_entity: wtkuan
wandb_watch: "false"
wandb_name: qwen2.5-3b-weight-steer-secure-v4
wandb_log_model: "false"

gradient_accumulation_steps: 4
micro_batch_size: 4
optimizer: adamw_torch
lr_scheduler: cosine
learning_rate: 2e-5

bf16: true
tf32: false

train_on_inputs: true

gradient_checkpointing: true
resume_from_checkpoint:
logging_steps: 1
flash_attention: true

num_epochs: 2
warmup_ratio: 0.1
eval_steps: 20
save_steps: 20
save_total_limit: 3
load_best_model_at_end: true
weight_decay: 0.01

special_tokens:
plugins:
